name: E2E

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Run inside the pinned Playwright image so browsers AND rendering match the
    # committed visual baselines byte-for-byte (generated in this same image).
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
      options: --ipc=host

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trace_test
          POSTGRES_USER: trace
          POSTGRES_PASSWORD: trace
        options: >-
          --health-cmd "pg_isready -U trace -d trace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        # bitnami image auto-starts the server and creates the buckets.
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: passports,reports

    env:
      # Services are reachable by name from the job container.
      DATABASE_URL: postgresql://trace:trace@postgres:5432/trace_test
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      JWT_SECRET: test-secret-min-16-chars-long
      JWT_EXPIRY: 1h
      NODE_ENV: development
      API_PORT: "3001"
      WEB_URL: http://localhost:3000
      API_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Deterministic trust layer — no real VeChain dependency in CI.
      DEMO_SIMULATE_ANCHOR: "true"
      E2E_BASE_URL: http://localhost:3000
      E2E_API_URL: http://localhost:3001

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            curl -sf http://minio:9000/minio/health/live && break || sleep 2
          done

      - name: Migrate + seed the test database
        run: |
          pnpm --filter @trace/db migrate
          pnpm --filter @trace/db seed
          pnpm --filter @trace/db seed:workshop

      - name: Build
        run: pnpm build

      - name: Start API + Web
        run: |
          pnpm --filter @trace/api exec tsx src/index.ts > /tmp/api.log 2>&1 &
          pnpm --filter @trace/web start > /tmp/web.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3001/health && curl -sf http://localhost:3000 >/dev/null && break || sleep 2
          done

      - name: Run E2E suite (functional + visual)
        run: pnpm e2e

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "----- API -----"; tail -n 120 /tmp/api.log || true
          echo "----- WEB -----"; tail -n 120 /tmp/web.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            packages/e2e/playwright-report
            packages/e2e/test-results
          retention-days: 7
