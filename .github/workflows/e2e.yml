name: E2E

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trace_test
          POSTGRES_USER: trace
          POSTGRES_PASSWORD: trace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trace -d trace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://trace:trace@localhost:5432/trace_test
      REDIS_URL: redis://localhost:6379
      MINIO_ENDPOINT: localhost
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      JWT_SECRET: test-secret-min-16-chars-long
      JWT_EXPIRY: 1h
      NODE_ENV: development
      API_PORT: "3001"
      WEB_URL: http://localhost:3000
      API_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Deterministic trust layer — no real VeChain dependency in CI.
      DEMO_SIMULATE_ANCHOR: "true"
      E2E_BASE_URL: http://localhost:3000
      E2E_API_URL: http://localhost:3001

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start MinIO + create buckets
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break || sleep 2
          done
          docker run --rm --network host minio/mc sh -c \
            "mc alias set local http://localhost:9000 minioadmin minioadmin && mc mb -p local/passports local/reports"

      - name: Migrate + seed the test database
        run: |
          pnpm --filter @trace/db migrate
          pnpm --filter @trace/db seed
          pnpm --filter @trace/db seed:workshop

      - name: Build
        run: pnpm build

      - name: Start API + Web
        run: |
          pnpm --filter @trace/api exec tsx src/index.ts > /tmp/api.log 2>&1 &
          pnpm --filter @trace/web start > /tmp/web.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3001/health >/dev/null && curl -sf http://localhost:3000 >/dev/null && break || sleep 2
          done

      - name: Install Playwright browsers
        run: pnpm --filter @trace/e2e exec playwright install --with-deps chromium

      # Functional + mobile specs. Visual specs are opt-in (RUN_VISUAL=1) and run
      # in the pinned Playwright container locally, where rendering matches the
      # committed baselines — so they are intentionally skipped here.
      - name: Run E2E suite (functional + mobile)
        run: pnpm e2e

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "----- API -----"; tail -n 120 /tmp/api.log || true
          echo "----- WEB -----"; tail -n 120 /tmp/web.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            packages/e2e/playwright-report
            packages/e2e/test-results
          retention-days: 7
