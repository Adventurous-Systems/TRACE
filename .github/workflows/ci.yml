name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trace_test
          POSTGRES_USER: trace
          POSTGRES_PASSWORD: trace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trace -d trace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build monorepo
        run: pnpm build

      - name: Run database migrations for tests
        env:
          DATABASE_URL: postgresql://trace:trace@localhost:5432/trace_test
        run: pnpm --filter @trace/db migrate

      - name: Seed test database
        env:
          DATABASE_URL: postgresql://trace:trace@localhost:5432/trace_test
        run: pnpm --filter @trace/db seed

      - name: Run API tests
        env:
          DATABASE_URL: postgresql://trace:trace@localhost:5432/trace_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-min-16-chars-long
          JWT_EXPIRY: 1h
          API_PORT: 3001
          WEB_URL: http://localhost:3000
          API_URL: http://localhost:3001
          NODE_ENV: test
        run: pnpm --filter @trace/api test
