name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Defined once and reused by each retry attempt below.
  DEPLOY_SCRIPT: |
    set -euo pipefail
    cd /opt/TRACE-staging
    git fetch origin
    git checkout staging
    git reset --hard origin/staging
    docker compose up -d postgres redis thor-solo minio meilisearch
    docker compose run --rm --build api pnpm --filter @trace/db migrate
    docker compose up -d --build api web
    docker compose ps

jobs:
  deploy:
    runs-on: ubuntu-latest

    # The SSH hop from GitHub runners to the VPS occasionally times out
    # (intermittent upstream network drop). The deploy script is idempotent, so
    # we retry up to 3 times; the job only fails if all three attempts fail.
    steps:
      - name: Deploy staging over SSH (attempt 1)
        id: attempt1
        continue-on-error: true
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.TRACE_STAGING_SSH_HOST }}
          username: ${{ secrets.TRACE_STAGING_SSH_USER }}
          key: ${{ secrets.TRACE_STAGING_SSH_KEY }}
          script_stop: true
          script: ${{ env.DEPLOY_SCRIPT }}

      - name: Wait before retry
        if: steps.attempt1.outcome == 'failure'
        run: sleep 20

      - name: Deploy staging over SSH (attempt 2)
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.TRACE_STAGING_SSH_HOST }}
          username: ${{ secrets.TRACE_STAGING_SSH_USER }}
          key: ${{ secrets.TRACE_STAGING_SSH_KEY }}
          script_stop: true
          script: ${{ env.DEPLOY_SCRIPT }}

      - name: Wait before final retry
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        run: sleep 30

      - name: Deploy staging over SSH (attempt 3)
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.TRACE_STAGING_SSH_HOST }}
          username: ${{ secrets.TRACE_STAGING_SSH_USER }}
          key: ${{ secrets.TRACE_STAGING_SSH_KEY }}
          script_stop: true
          script: ${{ env.DEPLOY_SCRIPT }}
